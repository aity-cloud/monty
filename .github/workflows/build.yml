name: Build and Package

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  build-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Dagger Engine
        run: |
          docker run \
            --name dagger-engine \
            --privileged \
            --stop-signal SIGTERM \
            -d \
            -e _EXPERIMENTAL_DAGGER_CACHESERVICE_TOKEN=${{ secrets.DAGGER_CACHESERVICE_TOKEN }} \
            -e _EXPERIMENTAL_DAGGER_CACHESERVICE_URL=https://api.dagger.cloud/magicache \
            -v dagger-engine:/var/lib/dagger \
            registry.dagger.io/engine:v0.8.7

      - name: Build and Package (Main/Release)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: go run ./dagger -c dagger/ci/defaults
        env:
          _EXPERIMENTAL_DAGGER_CACHESERVICE_TOKEN: ${{ secrets.DAGGER_CACHESERVICE_TOKEN }}
          _EXPERIMENTAL_DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-container://dagger-engine
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Build and Package (PR)
        if: github.event_name == 'pull_request'
        run: go run ./dagger -c dagger/ci/defaults --coverage.export=true
        env:
          _EXPERIMENTAL_DAGGER_CACHESERVICE_TOKEN: ${{ secrets.DAGGER_CACHESERVICE_TOKEN }}
          _EXPERIMENTAL_DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-container://dagger-engine
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Publish Tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: go run ./dagger -c dagger/ci/defaults,dagger/ci/push,dagger/ci/push-charts,dagger/ci/tag-latest,dagger/ci/tag-release --lint=false --test=false
        env:
          _EXPERIMENTAL_DAGGER_CACHESERVICE_TOKEN: ${{ secrets.DAGGER_CACHESERVICE_TOKEN }}
          _EXPERIMENTAL_DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-container://dagger-engine
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Publish Main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: go run ./dagger -c dagger/ci/defaults,dagger/ci/push --lint=false --test=false
        env:
          _EXPERIMENTAL_DAGGER_CACHESERVICE_TOKEN: ${{ secrets.DAGGER_CACHESERVICE_TOKEN }}
          _EXPERIMENTAL_DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-container://dagger-engine
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Upload Coverage
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cover.out
          fail_ci_if_error: false

      - name: Cleanup Dagger Engine
        if: always()
        run: |
          docker stop --time 60 dagger-engine || true
          docker logs dagger-engine || true
          docker rm dagger-engine || true